name: Backend Ventas CI/CD

on:
  push:
    branches: [ deploy ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Ventas
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Desplegar Backend Ventas en EC2 vía SSM
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
        run: |
          echo "Enviando comando SSM a la instancia backend: ${{ secrets.EC2_INSTANCE_ID_BACKEND }}"
          CMDID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID_BACKEND }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Despliegue backend ventas desde GitHub Actions" \
            --parameters commands=["docker pull ${DOCKER_IMAGE}","docker stop backend-ventas || true","docker rm backend-ventas || true","docker run -d --name backend-ventas -p 8080:8080 --restart always -e DB_ENDPOINT=${{ secrets.DB_ENDPOINT }} -e DB_PORT=3306 -e DB_NAME=${{ secrets.DB_NAME }} -e DB_USERNAME=${{ secrets.DB_USERNAME }} -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} ${DOCKER_IMAGE}"] \
            --query "Command.CommandId" --output text)
          echo "SSM Command ID: $CMDID"
          for i in {1..24}; do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMDID" --instance-id "${{ secrets.EC2_INSTANCE_ID_BACKEND }}" --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "Estado de invocación: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Despliegue backend-ventas exitoso"
              # Comprobar salud localmente via SSM (curl desde la instancia)
              CHECKCMD=$(aws ssm send-command \
                --instance-ids "${{ secrets.EC2_INSTANCE_ID_BACKEND }}" \
                --document-name "AWS-RunShellScript" \
                --parameters commands=["curl -fsS http://localhost:8080/actuator/health || echo FAILED"] \
                --query "Command.CommandId" --output text)
              sleep 3
              OUT=$(aws ssm get-command-invocation --command-id "$CHECKCMD" --instance-id "${{ secrets.EC2_INSTANCE_ID_BACKEND }}" --query 'StandardOutputContent' --output text)
              echo "Health check output: $OUT"
              if echo "$OUT" | grep -q "UP"; then
                echo "Health OK"
                exit 0
              else
                echo "Health check failed (backend-ventas)"; exit 1
              fi
            fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Despliegue falló con estado: $STATUS" >&2
              aws ssm get-command-invocation --command-id "$CMDID" --instance-id "${{ secrets.EC2_INSTANCE_ID_BACKEND }}" || true
              exit 1
            fi
            sleep 5
          done
          echo "Timeout esperando resultado SSM" >&2
          aws ssm get-command-invocation --command-id "$CMDID" --instance-id "${{ secrets.EC2_INSTANCE_ID_BACKEND }}" || true
          exit 1