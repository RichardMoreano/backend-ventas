spring.application.name=Springboot-API-REST
server.address=0.0.0.0
server.port=8080
spring.web.allow-cors=true

# Configuraci�n de la base de datos MySQL en AWS RDS
spring.datasource.url=jdbc:mysql://db:3306/ventas_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ventas_user
spring.datasource.password=ventas_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraci�n de Hibernate
spring.jpa.database=mysql
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html
